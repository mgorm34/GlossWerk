<!DOCTYPE html>
<html><head>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body { background: #f3f4f6; display: flex; flex-direction: column; align-items: center; gap: 2.5rem; padding: 3rem; font-family: 'DM Sans', sans-serif; }
.label { color: #6b7280; font-size: 0.85rem; }
.row { display: flex; align-items: center; gap: 2rem; }
.dark-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 1.5rem 2.5rem; border-radius: 14px; display: flex; align-items: center; gap: 1rem; }
.wm { color: #fff; font-weight: 700; letter-spacing: -0.5px; font-family: 'DM Sans', sans-serif; }
.wm span { color: #10b981; }
</style></head><body>

<p class="label">Favicon — 16 / 32 / 48px:</p>
<div class="row" style="background:#fff;padding:1.5rem 2rem;border-radius:10px;border:1px solid #e5e7eb;">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16" fill="none"><rect width="512" height="512" rx="96" fill="#1a1a2e"/><path d="M310 140H240c-55.228 0-100 44.772-100 100v32c0 55.228 44.772 100 100 100h50v-116h-50" stroke="#10b981" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="284" y1="256" x2="380" y2="256" stroke="#10b981" stroke-width="44" stroke-linecap="round"/><polyline points="348,196 414,256 348,316" stroke="#10b981" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="32" height="32" fill="none"><rect width="512" height="512" rx="96" fill="#1a1a2e"/><path d="M310 140H240c-55.228 0-100 44.772-100 100v32c0 55.228 44.772 100 100 100h50v-116h-50" stroke="#10b981" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="284" y1="256" x2="380" y2="256" stroke="#10b981" stroke-width="44" stroke-linecap="round"/><polyline points="348,196 414,256 348,316" stroke="#10b981" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="48" height="48" fill="none"><rect width="512" height="512" rx="96" fill="#1a1a2e"/><path d="M310 140H240c-55.228 0-100 44.772-100 100v32c0 55.228 44.772 100 100 100h50v-116h-50" stroke="#10b981" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="284" y1="256" x2="380" y2="256" stroke="#10b981" stroke-width="44" stroke-linecap="round"/><polyline points="348,196 414,256 348,316" stroke="#10b981" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
</div>

<p class="label">App header:</p>
<div class="dark-bg">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="44" height="44" fill="none" style="border-radius:8px;"><rect width="512" height="512" rx="96" fill="rgba(255,255,255,0.08)"/><path d="M310 140H240c-55.228 0-100 44.772-100 100v32c0 55.228 44.772 100 100 100h50v-116h-50" stroke="#10b981" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="284" y1="256" x2="380" y2="256" stroke="#10b981" stroke-width="44" stroke-linecap="round"/><polyline points="348,196 414,256 348,316" stroke="#10b981" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  <div class="wm" style="font-size:1.8rem;">Gloss<span>Werk</span></div>
</div>

<p class="label">Hero:</p>
<div style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:3rem;border-radius:14px;text-align:center;width:600px;">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="80" height="80" fill="none" style="border-radius:16px;margin-bottom:1rem;"><rect width="512" height="512" rx="96" fill="rgba(255,255,255,0.08)"/><path d="M310 140H240c-55.228 0-100 44.772-100 100v32c0 55.228 44.772 100 100 100h50v-116h-50" stroke="#10b981" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="284" y1="256" x2="380" y2="256" stroke="#10b981" stroke-width="44" stroke-linecap="round"/><polyline points="348,196 414,256 348,316" stroke="#10b981" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  <div class="wm" style="font-size:3.5rem;letter-spacing:-1px;">Gloss<span>Werk</span></div>
</div>

</body></html>
